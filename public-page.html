<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading… — VibeKit Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
/* Loading state */
body { margin: 0; font-family: 'Instrument Sans', sans-serif; -webkit-font-smoothing: antialiased; }

/* Skeleton / loading */
.loading-screen {
  position: fixed; inset: 0;
  background: #080810;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 999;
  transition: opacity 0.4s ease;
}
.loading-logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: #eeeaf4;
  letter-spacing: -0.02em;
}
.loading-logo span { color: #7c5cfc; }
.loading-bar {
  width: 160px; height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.loading-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #7c5cfc, #00e5b0);
  border-radius: 3px;
  animation: load-progress 1.2s ease-in-out infinite;
}
@keyframes load-progress {
  0%   { width: 0%; margin-left: 0; }
  50%  { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}

/* Error screen */
.error-screen {
  position: fixed; inset: 0;
  background: #080810;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; text-align: center;
  padding: 24px;
}
.error-screen.show { display: flex; }
.error-code { font-size: 64px; font-weight: 800; font-family: 'Syne', sans-serif; color: rgba(255,255,255,0.1); }
.error-title { font-size: 24px; font-weight: 700; color: #eeeaf4; font-family: 'Syne', sans-serif; }
.error-sub { color: rgba(238,234,244,0.5); font-size: 15px; max-width: 320px; }
.error-back {
  margin-top: 8px; padding: 10px 24px;
  background: #7c5cfc; color: white; border-radius: 10px;
  font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block;
}

/* ─── RENDERED PAGE ─── */
#page-root { display: none; }
#page-root.visible { display: block; }

/* Powered-by badge */
.powered-badge {
  position: fixed; bottom: 16px; right: 16px;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 6px 12px;
  font-size: 11px; color: rgba(255,255,255,0.5);
  font-family: 'Instrument Sans', sans-serif;
  text-decoration: none; z-index: 1000;
  transition: all 0.2s;
}
.powered-badge:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.2); }
.powered-badge span { color: #7c5cfc; }

/* ── THEME STYLES ── */

/* Minimal */
.theme-minimal {
  --bg: #fafaf9; --surface: #ffffff; --text: #1a1a18;
  --muted: #888884; --accent: #2563eb; --accent-text: #ffffff;
  --radius: 6px; --border-color: #e5e5e3;
  font-family: 'Georgia', serif;
}
.theme-minimal nav { background: var(--surface); border-bottom: 1px solid var(--border-color); }
.theme-minimal body, .theme-minimal #page-root { background: var(--bg); color: var(--text); }

/* Neo-Brutal */
.theme-neobrutalist {
  --bg: #f5f0e8; --surface: #ffffff; --text: #1a1a1a;
  --muted: #666; --accent: #ff3e00; --accent-text: #ffffff;
  --radius: 0px; --border-color: #1a1a1a;
  font-family: 'Arial Black', Impact, sans-serif;
}

/* Dark Neon */
.theme-dark-neon {
  --bg: #050510; --surface: #0a0a1f; --text: #f0eeff;
  --muted: rgba(240,238,255,0.45); --accent: #7c5cfc; --accent-text: #ffffff;
  --radius: 12px; --border-color: rgba(124,92,252,0.2);
  font-family: 'Syne', sans-serif;
}

/* Pastel */
.theme-pastel {
  --bg: #fef6f0; --surface: #fff8f5; --text: #3d2c2c;
  --muted: #b0948a; --accent: #e8789a; --accent-text: #ffffff;
  --radius: 20px; --border-color: #f5ddd4;
  font-family: 'Georgia', serif;
}

/* Luxury */
.theme-luxury {
  --bg: #0a0a08; --surface: #111110; --text: #e8d5a3;
  --muted: rgba(232,213,163,0.5); --accent: #c9a96e; --accent-text: #0a0a08;
  --radius: 2px; --border-color: rgba(201,169,110,0.2);
  font-family: 'Georgia', serif;
}

/* Retro */
.theme-retro {
  --bg: #1a0a00; --surface: #250e00; --text: #ff6b00;
  --muted: rgba(255,107,0,0.5); --accent: #ff6b00; --accent-text: #1a0a00;
  --radius: 0px; --border-color: rgba(255,107,0,0.3);
  font-family: 'Courier New', monospace;
}

/* ─── COMMON PAGE STYLES ─── */
.vk-page { min-height: 100vh; }

.vk-nav {
  position: sticky; top: 0; z-index: 10;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
}
.vk-nav-logo {
  font-size: 20px; font-weight: 800; color: var(--accent);
  letter-spacing: -0.02em;
}
.vk-nav-links { display: flex; gap: 20px; }
.vk-nav-links a {
  font-size: 14px; color: var(--muted); text-decoration: none;
  font-weight: 500; transition: color 0.15s;
}
.vk-nav-links a:hover { color: var(--text); }

/* Hero */
.vk-hero {
  padding: clamp(60px, 10vw, 120px) 24px;
  text-align: center;
  background: var(--bg);
  border-bottom: 1px solid var(--border-color);
}
.vk-hero h1 {
  font-size: clamp(28px, 6vw, 64px);
  font-weight: 800; color: var(--text);
  line-height: 1.12; margin-bottom: 20px;
  letter-spacing: -0.03em;
}
.vk-hero p {
  font-size: clamp(15px, 2.5vw, 20px);
  color: var(--muted); max-width: 600px;
  margin: 0 auto 36px; line-height: 1.65;
}
.vk-btn {
  display: inline-block; padding: 14px 32px;
  background: var(--accent); color: var(--accent-text);
  font-size: 16px; font-weight: 700;
  border-radius: var(--radius); text-decoration: none;
  transition: all 0.2s; border: 2px solid transparent;
}
.theme-neobrutalist .vk-btn {
  border: 2px solid var(--text); box-shadow: 4px 4px 0 var(--text);
}
.theme-neobrutalist .vk-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--text); }
.theme-dark-neon .vk-btn {
  background: transparent; border: 1px solid var(--accent);
  color: var(--accent); box-shadow: 0 0 20px rgba(124,92,252,0.25);
}
.theme-dark-neon .vk-btn:hover { background: rgba(124,92,252,0.1); box-shadow: 0 0 30px rgba(124,92,252,0.4); }
.theme-retro .vk-btn {
  background: transparent; border: 1px solid var(--accent);
  color: var(--accent);
}
.vk-btn:hover:not(.theme-neobrutalist .vk-btn):not(.theme-dark-neon .vk-btn) { opacity: 0.9; transform: translateY(-1px); }

/* Features */
.vk-features {
  padding: clamp(48px, 8vw, 96px) 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-color);
}
.vk-section-inner { max-width: 1100px; margin: 0 auto; }
.vk-section-title {
  font-size: clamp(22px, 3.5vw, 40px);
  font-weight: 700; color: var(--text);
  margin-bottom: 40px; text-align: center;
  letter-spacing: -0.02em;
}
.vk-features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}
.vk-feature-card {
  padding: 24px;
  background: var(--bg);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  transition: all 0.2s;
}
.theme-neobrutalist .vk-feature-card { border: 2px solid var(--text); box-shadow: 3px 3px 0 var(--text); }
.theme-dark-neon .vk-feature-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(124,92,252,0.15); }
.vk-feature-card h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.vk-feature-card p { font-size: 14px; color: var(--muted); line-height: 1.65; }

/* Gallery */
.vk-gallery {
  padding: clamp(48px, 8vw, 96px) 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border-color);
}
.vk-gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 40px;
}
.vk-gallery-item {
  aspect-ratio: 4/3; overflow: hidden;
  border-radius: var(--radius);
  border: 1px solid var(--border-color);
  background: var(--surface);
}
.vk-gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
  display: block;
}
.vk-gallery-item:hover img { transform: scale(1.04); }

/* Contact */
.vk-contact {
  padding: clamp(48px, 8vw, 96px) 24px;
  background: var(--surface);
}
.vk-contact-inner { max-width: 560px; margin: 0 auto; text-align: center; }
.vk-contact h2 { font-size: clamp(22px, 3.5vw, 40px); font-weight: 700; color: var(--text); margin-bottom: 12px; letter-spacing: -0.02em; }
.vk-contact p { color: var(--muted); font-size: 15px; margin-bottom: 36px; line-height: 1.65; }
.vk-form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
.vk-input {
  width: 100%; padding: 13px 15px;
  background: var(--bg); border: 1px solid var(--border-color);
  border-radius: var(--radius); color: var(--text);
  font-size: 15px; outline: none; font-family: inherit;
  transition: border-color 0.15s;
}
.vk-input:focus { border-color: var(--accent); }
.vk-input::placeholder { color: var(--muted); }
.vk-textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
.vk-submit {
  padding: 13px 28px; background: var(--accent);
  color: var(--accent-text); border: none;
  border-radius: var(--radius); font-size: 15px;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.theme-neobrutalist .vk-submit { border: 2px solid var(--text); box-shadow: 3px 3px 0 var(--text); }
.vk-submit:hover { opacity: 0.9; }
.vk-form-msg { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; display: none; }
.vk-form-msg.success { background: rgba(0,229,176,0.1); color: #00e5b0; border: 1px solid rgba(0,229,176,0.2); display: block; }
.vk-form-msg.error { background: rgba(255,77,106,0.1); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.2); display: block; }

/* Footer */
.vk-footer {
  padding: 32px 24px;
  background: var(--surface);
  border-top: 1px solid var(--border-color);
  text-align: center;
}
.vk-footer p { color: var(--muted); font-size: 13px; }
.vk-footer a { color: var(--accent); text-decoration: none; }

/* Section reveal animation */
.vk-reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.vk-reveal.in { opacity: 1; transform: none; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .vk-nav-links { display: none; }
  .vk-features-grid { grid-template-columns: 1fr; }
  .vk-gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .vk-gallery-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Vibe<span>Kit</span> Studio</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- Error screen -->
<div class="error-screen" id="errorScreen">
  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <div class="error-sub">This page doesn't exist or hasn't been published yet.</div>
  <a href="/" class="error-back">← Back to VibeKit</a>
</div>

<!-- Page content -->
<div id="page-root"></div>

<!-- Powered by badge -->
<a href="/" class="powered-badge" title="Made with VibeKit Studio">Made with <span>VibeKit</span></a>

<script>
/* ─── GET SLUG ─── */
function getSlug() {
  // Works for /p/slug, ?slug=slug, or hash-based routing
  const path = window.location.pathname;
  const match = path.match(/\/p\/([^/]+)/);
  if (match) return match[1];
  const params = new URLSearchParams(window.location.search);
  return params.get('slug') || '';
}

const slug = getSlug();

/* ─── LOAD PAGE ─── */
async function loadPage() {
  if (!slug) { showError(); return; }
  try {
    const res = await fetch(`/api/public/pages/${slug}`);
    if (!res.ok) { showError(); return; }
    const data = await res.json();
    const page = data.page || data;
    // The API already filters WHERE status = 'published' — if we got a page object, it's published
    if (!page || !page.id) { showError(); return; }

    // Track view (fire and forget)
    fetch(`/api/public/pages/${slug}/view`, { method: 'POST' }).catch(() => {});

    renderPage(page);
    // Update page title
    document.title = `${page.title || 'Page'} — VibeKit Studio`;

    // Meta tags
    setMeta('description', page.content?.hero?.subtitle || '');
    setMeta('og:title', page.title);

    // Hide loading
    const ls = document.getElementById('loadingScreen');
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 400);
    document.getElementById('page-root').classList.add('visible');

    // Scroll reveal
    initReveal();
  } catch (e) {
    console.error(e);
    showError();
  }
}

function setMeta(name, content) {
  let el = document.querySelector(`meta[name="${name}"],meta[property="${name}"]`);
  if (!el) { el = document.createElement('meta'); if (name.startsWith('og:')) el.setAttribute('property', name); else el.setAttribute('name', name); document.head.appendChild(el); }
  el.setAttribute('content', content || '');
}

function showError() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').classList.add('show');
  document.title = 'Not Found — VibeKit Studio';
}

/* ─── RENDER ─── */
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPage(page) {
  const theme = page.theme || 'minimal';
  const content = page.content || {};
  const hero = content.hero || {};
  const features = content.features || { cards: [] };
  const gallery = content.gallery || { images: [] };
  const contact = content.contact || {};
  const order = content.sectionOrder || ['hero','features','gallery','contact'];

  // Apply theme class to body
  document.body.className = `theme-${theme}`;
  document.body.style.background = getThemeVar(theme, 'bg');

  const sections = {
    hero: `
      <section class="vk-hero vk-reveal">
        <h1>${esc(hero.title || page.title || 'Welcome')}</h1>
        <p>${esc(hero.subtitle || '')}</p>
        ${hero.btnText ? `<a href="${esc(hero.btnUrl || '#contact')}" class="vk-btn">${esc(hero.btnText)}</a>` : ''}
      </section>`,

    features: features.cards.length > 0 ? `
      <section class="vk-features vk-reveal">
        <div class="vk-section-inner">
          <h2 class="vk-section-title">Features</h2>
          <div class="vk-features-grid">
            ${features.cards.map(c => `
              <div class="vk-feature-card">
                <h3>${esc(c.title)}</h3>
                <p>${esc(c.desc)}</p>
              </div>
            `).join('')}
          </div>
        </div>
      </section>` : '',

    gallery: (gallery.images || []).filter(u => u).length > 0 ? `
      <section class="vk-gallery vk-reveal">
        <div class="vk-section-inner">
          <h2 class="vk-section-title">Gallery</h2>
          <div class="vk-gallery-grid">
            ${gallery.images.filter(u => u).map(url => `
              <div class="vk-gallery-item">
                <img src="${esc(url)}" alt="" loading="lazy"/>
              </div>
            `).join('')}
          </div>
        </div>
      </section>` : '',

    contact: `
      <section class="vk-contact vk-reveal" id="contact">
        <div class="vk-contact-inner">
          <h2>${esc(contact.heading || 'Get in touch')}</h2>
          <p>${esc(contact.subtext || '')}</p>
          <form class="vk-form" id="contactForm">
            <input class="vk-input" name="name" placeholder="Your name" required/>
            <input class="vk-input" type="email" name="email" placeholder="Email address" required/>
            <textarea class="vk-input vk-textarea" name="message" placeholder="Your message" required></textarea>
            <div class="vk-form-msg" id="formMsg"></div>
            <button type="submit" class="vk-submit" id="submitBtn">${theme === 'retro' ? '> SEND MESSAGE' : 'Send Message'}</button>
          </form>
        </div>
      </section>`
  };

  const nav = `
    <nav class="vk-nav">
      <span class="vk-nav-logo">${esc(page.title || 'My Site')}</span>
      <div class="vk-nav-links">
        <a href="#contact">Contact</a>
      </div>
    </nav>`;

  const footer = `
    <footer class="vk-footer">
      <p>Made with <a href="/">VibeKit Studio</a></p>
    </footer>`;

  const body = order.map(s => sections[s] || '').join('');
  document.getElementById('page-root').innerHTML = `<div class="vk-page">${nav}${body}${footer}</div>`;

  // Contact form handler
  document.getElementById('contactForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('formMsg');
    const data = {
      name: form.name.value,
      email: form.email.value,
      message: form.message.value
    };
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch(`/api/public/pages/${slug}/contact`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Send failed');
      msg.className = 'vk-form-msg success';
      msg.textContent = '✓ Message sent! We\'ll be in touch soon.';
      form.reset();
    } catch (err) {
      msg.className = 'vk-form-msg error';
      msg.textContent = '✕ ' + (err.message || 'Something went wrong. Please try again.');
    }
    btn.disabled = false;
    btn.textContent = theme === 'retro' ? '> SEND MESSAGE' : 'Send Message';
  });
}

function getThemeVar(theme, prop) {
  const map = {
    minimal: { bg: '#fafaf9' },
    neobrutalist: { bg: '#f5f0e8' },
    'dark-neon': { bg: '#050510' },
    pastel: { bg: '#fef6f0' },
    luxury: { bg: '#0a0a08' },
    retro: { bg: '#1a0a00' }
  };
  return map[theme]?.[prop] || '#ffffff';
}

/* ─── SCROLL REVEAL ─── */
function initReveal() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('in'); io.unobserve(entry.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.vk-reveal').forEach(el => io.observe(el));
}

/* ─── INIT ─── */
loadPage();
</script>
</body>
</html>
